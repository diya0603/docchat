services:
  backend:
    build: ./RAG Implementation
    ports:
      - "8000:8000"
    env_file:
      - ./RAG Implementation/.env
    volumes:
      - chroma_data:/app/chroma_langchain_db

  chromadb:
    image: chromadb/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  frontend:
    build: ./rag-app-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./rag-app-frontend/.env.local
    depends_on:
      - backend

volumes:
  chroma_data: